<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부경대학교 학식 메뉴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5; color: #333; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            text-align: center; background: #fff; padding: 40px;
            border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px; width: 100%;
        }
        h1 { font-size: 1.5rem; margin-bottom: 16px; color: #1a1a1a; }
        p { font-size: 1rem; color: #666; line-height: 1.6; }
        @media (max-width: 600px) {
            body { padding: 16px; }
            .container { padding: 24px; }
            h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>부경대학교 학식 메뉴</h1>
        <p>식단 정보가 준비 중입니다.</p>
        <p>매주 월요일 자동으로 업데이트됩니다.</p>
    </div>
</body>
</html>
